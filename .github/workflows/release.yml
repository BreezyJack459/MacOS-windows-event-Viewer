name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Build DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          NOTARIZATION_USERNAME: ${{ secrets.NOTARIZATION_USERNAME }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          APP_VERSION: ${{ github.ref_name }}
        run: |
          chmod +x script/create_dmg.sh
          ./script/create_dmg.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WindowsEventLogViewer.dmg
          body: |
            ## Windows Event Log Viewer ${{ github.ref_name }}

            ### Download
            Download `WindowsEventLogViewer.dmg` below and drag `WinEventLogViewer.app` to your **Applications** folder.

            ### macOS Gatekeeper
            This app is not signed with an Apple Developer ID. On first launch, macOS will show a security warning. To open the app:

            1. **Right-click** `WinEventLogViewer.app` in Applications
            2. Select **Open**
            3. Click **Open** in the dialog

            Alternatively, remove the quarantine flag in Terminal:
            ```bash
            xattr -cr /Applications/WinEventLogViewer.app
            ```

            ### Requirements
            - macOS 13 or later
